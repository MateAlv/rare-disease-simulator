# MVP configuration placeholder.
#
# This file will hold source locations, selected diseases, LLM extraction
# settings, profile merge thresholds, simulator parameters, and export paths.

mvp:
  diseases:
    - disease: Niemann-Pick disease type C1
      gene: NPC1
    - disease: Rett syndrome / atypical Rett syndrome
      gene: MECP2
    - disease: Duchenne muscular dystrophy
      gene: DMD
    - disease: Cystic fibrosis
      gene: CFTR
    - disease: Neuronal ceroid lipofuscinosis 6
      gene: CLN6
    - disease: Pompe disease / glycogen storage disease II
      gene: GAA
    - disease: Hypophosphatasia
      gene: ALPL
    - disease: Noonan syndrome
      gene: PTPN11

sources:
  hpo_dir: data/raw/hpo
  hpo_terms_path: data/raw/hpo/hpo_terms.tsv
  phenotype_annotation_path: data/raw/hpo/phenotype.hpoa
  genes_to_phenotype_path: data/raw/hpo/genes_to_phenotype.txt
  negative_phenotype_annotation_path: data/raw/hpo/negative_phenotype_annotation.tab
  orphadata_dir: data/raw/orphadata
  mondo_path: data/raw/mondo/mondo.json

llm:
  provider: dummy
  model: dummy
  prompt_version: mvp-v0
  extraction_schema_version: mvp-v0
  cache_dir: data/cache/llm_extraction
  temperature: 0.0

simulation:
  difficulties:
    - easy
    - medium
    - hard
  cases_per_disease_per_difficulty: 100
  seed: 42

exports:
  profiles_path: outputs/profiles.jsonl
  profile_patches_path: outputs/profile_patches.jsonl
  rich_cases_path: outputs/rich_cases.jsonl
  graphens_path: outputs/graphens.json
  review_dir: outputs/review

fixtures:
  fixture_dir: data/fixtures
